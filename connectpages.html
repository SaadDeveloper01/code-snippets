<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>link working</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }
        html{
            scroll-behavior: smooth;
        }
        #control1 {
            background-color: beige;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 110px;
        }

        #logo-navbar {
            padding: 12px;
        }

        #h-img {
            height: 118px;
        }



        ul {
            list-style: none;
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-right: 20px;
        }

        li a {
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s ease-in-out;

            color: black;
        }

        li a:hover {
            color: brown;
            font-weight: bolder;
        }

        .icons img {
            height: 33px;
            margin: 12px;
        }

        #control2 {
            justify-content: center;
            align-items: center;
        }

        #Home {
            height: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: blueviolet;
            width: 100%;
            font-size: 170px;
        }

        #About {
            height: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(172, 162, 119);
            width: 100%;
            font-size: 170px;
        }

        #Men {
            height: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(132, 173, 154);
            width: 100%;
            font-size: 170px;
        }

        #Women {
            height: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(144, 119, 172);
            width: 100%;
            font-size: 170px;
        }

        #Contact {
            height: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(175, 124, 144);
            width: 100%;
            font-size: 170px;
        }
    </style>
</head>

<body>
    <header id="control1">

        <div class="logo-navbar">
            <img src="DATA/logos/nav-LOGO/Logo-removebg-preview.png" alt="website-logo" id="h-img">
        </div>
        <div class="links-navbar">
            <ul>
                <li><a href="#Home">Home</a></li>
                <li><a href="#About">About us</a></li>
                <li><a href="#Men">Men</a></li>
                <li><a href="#Women">Women</a></li>
                <li><a href="#Contact">Contact Us</a></li>
            </ul>
        </div>
        <div class="icons">
            <img src="DATA/icons/global-search.png" alt="">
            <img src="DATA/icons/profile.png" alt="">
            <img src="DATA/icons/shopping-bag.png" alt="">

        </div>

    </header>

    <section id="control2">
        <div id="Home">
            HOME
        </div>

        <div id="About">
            ABOUT US
        </div>

        <div id="Men">
            MEN
        </div>

        <div id="Women">
            WOMEN
        </div>

        <div id="Contact">
            CONTACT US
        </div>

    </section>

</body>

</html>
